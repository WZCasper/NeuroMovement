name: Build Windows Release

on:
  release:
    types: [created]
  workflow_dispatch: {}

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Show free disk space (before)
        run: Get-PSDrive C | Select-Object Used,Free

      - name: Install runtime + build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir -r requirements.txt
          pip install --no-cache-dir pyinstaller

      - name: Clear pip cache to free disk space before bundling
        run: pip cache purge

      - name: Fetch model weights (if not already committed to the repo)
        run: python scripts/fetch_weights.py

      - name: Verify model weights are present
        run: |
          if (!(Test-Path "weights/yolov8n-seg.pt")) {
            Write-Error "weights/yolov8n-seg.pt отсутствует — сборка невозможна."
            exit 1
          }

      - name: Run test suite
        run: |
          pip install --no-cache-dir pytest
          $env:QT_QPA_PLATFORM = "offscreen"
          pytest tests/ -v

      - name: Show free disk space (after installs)
        run: Get-PSDrive C | Select-Object Used,Free

      - name: Build with PyInstaller
        run: pyinstaller neuromovement.spec --noconfirm

      - name: Package portable build
        run: Compress-Archive -Path "dist/NeuroMovement/*" -DestinationPath "NeuroMovement-Windows.zip"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: NeuroMovement-Windows
          path: NeuroMovement-Windows.zip
          retention-days: 30

      - name: Attach artifact to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: NeuroMovement-Windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
